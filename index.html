<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a2540">
<title>B777 题库练习</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon192.png">
<style>
  :root{
    --bg:#f2f2f7; --card:#ffffff; --text:#1c1c1e; --sub:#8e8e93; --accent:#0a5cff; --border:rgba(60,60,67,.12);
    --chip-bg:rgba(10,92,255,.08); --good:#1fa855; --good-bg:rgba(31,168,85,.12);
    --bad:#e5484d; --bad-bg:rgba(229,72,77,.12); --amber:#c9860b;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#000000; --card:#1c1c1e; --text:#f5f5f7; --sub:#98989d; --accent:#3d8bff; --border:rgba(255,255,255,.12);
      --chip-bg:rgba(61,139,255,.16); --good:#32d268; --good-bg:rgba(50,210,104,.16);
      --bad:#ff5b5f; --bad-bg:rgba(255,91,95,.16); --amber:#e0a83d; }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:max(20px,env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;}
  .screen{display:none;}
  .screen.active{display:block;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .brand img{width:46px;height:46px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .brand h1{font-size:20px;margin:0;}
  .brand .sub{font-size:12px;color:var(--sub);margin-top:1px;}

  .stat-row{display:flex;gap:10px;margin-bottom:18px;}
  .stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 10px;text-align:center;}
  .stat-box .n{font-size:22px;font-weight:700;}
  .stat-box .l{font-size:11px;color:var(--sub);margin-top:2px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{font-size:16px;margin:0 0 4px;}
  .card .desc{font-size:13px;color:var(--sub);margin:0 0 14px;line-height:1.5;}

  .mode-btn{display:flex;align-items:center;gap:14px;width:100%;border:none;background:var(--card);border:1px solid var(--border);
    border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;text-align:left;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .mode-btn:active{opacity:.7;}
  .mode-btn .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .mode-btn.practice .ic{background:var(--chip-bg);}
  .mode-btn.test .ic{background:rgba(201,134,11,.14);}
  .mode-btn.wrongbank .ic{background:var(--bad-bg);}
  .mode-btn .t{font-size:16px;font-weight:600;}
  .mode-btn .d{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .mode-btn .arrow{margin-left:auto;color:var(--sub);font-size:18px;}

  .section-title{font-size:13px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin:22px 0 10px;}

  .opt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .opt-pill{flex:1;min-width:70px;text-align:center;padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);
    background:var(--card);font-size:14px;font-weight:600;cursor:pointer;color:var(--text);}
  .opt-pill.sel{border-color:var(--accent);background:var(--chip-bg);color:var(--accent);}

  .big-btn{display:block;width:100%;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;
    background:var(--accent);color:#fff;margin-top:6px;}
  .big-btn:disabled{opacity:.4;}
  .big-btn.secondary{background:var(--chip-bg);color:var(--accent);}
  .big-btn:active{opacity:.75;}
  .back-link{display:inline-flex;align-items:center;gap:4px;color:var(--sub);font-size:14px;background:none;border:none;cursor:pointer;padding:6px 0;margin-bottom:10px;}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-row .t{font-size:14.5px;font-weight:500;}
  .toggle-row .d{font-size:12px;color:var(--sub);margin-top:1px;}
  .tog{width:46px;height:28px;border-radius:14px;background:var(--border);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
  .tog.on{background:var(--accent);}
  .tog .td{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .tog.on .td{left:20px;}

  /* Quiz screen */
  .quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .quiz-top .prog-txt{font-size:13px;color:var(--sub);font-weight:600;}
  .quiz-top .cat-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--chip-bg);color:var(--accent);}
  .prog-bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;margin-bottom:18px;}
  .prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .25s ease;}
  .q-id{font-size:11px;color:var(--sub);margin-bottom:6px;}
  .q-text{font-size:17px;font-weight:600;line-height:1.5;margin-bottom:18px;}
  .ans-btn{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--border);background:var(--card);
    border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;font-size:14.5px;line-height:1.45;color:var(--text);}
  .ans-btn .lt{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--sub);}
  .ans-btn.correct{border-color:var(--good);background:var(--good-bg);}
  .ans-btn.correct .lt{background:var(--good);border-color:var(--good);color:#fff;}
  .ans-btn.wrong{border-color:var(--bad);background:var(--bad-bg);}
  .ans-btn.wrong .lt{background:var(--bad);border-color:var(--bad);color:#fff;}
  .ans-btn.dim{opacity:.5;}
  .ans-btn:disabled{cursor:default;}
  .ref-box{font-size:12.5px;color:var(--sub);background:var(--bg);border-radius:12px;padding:12px 14px;margin:12px 0 6px;line-height:1.6;display:none;}
  .ref-box.show{display:block;}
  .ref-box b{color:var(--text);}

  /* Results screen */
  .score-ring{width:140px;height:140px;margin:6px auto 18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:conic-gradient(var(--accent) calc(var(--pct,0)*1%), var(--border) 0);}
  .score-ring .inner{width:114px;height:114px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .score-ring .pctnum{font-size:28px;font-weight:800;}
  .score-ring .pctlbl{font-size:11px;color:var(--sub);}
  .result-summary{text-align:center;font-size:14px;color:var(--sub);margin-bottom:20px;}
  .wrong-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
  .wrong-item .qid{font-size:11px;color:var(--sub);margin-bottom:4px;}
  .wrong-item .qtext{font-size:14.5px;font-weight:600;margin-bottom:8px;line-height:1.45;}
  .wrong-item .line{font-size:13px;margin-bottom:3px;line-height:1.45;}
  .wrong-item .line.bad{color:var(--bad);}
  .wrong-item .line.good{color:var(--good);}
  .wrong-item .ref{font-size:12px;color:var(--sub);margin-top:6px;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--sub);}
  .empty-state .em{font-size:38px;margin-bottom:10px;}

  .install-hint{font-size:12px;color:var(--sub);text-align:center;margin-top:22px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <div class="screen active" id="home">
    <div class="brand">
      <img src="icon192.png" alt="">
      <div>
        <h1>B777 题库练习</h1>
        <div class="sub" id="homeSub">共 964 道题</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-box"><div class="n" id="statSeen">0</div><div class="l">已练习</div></div>
      <div class="stat-box"><div class="n" id="statAcc">–</div><div class="l">正确率</div></div>
      <div class="stat-box"><div class="n" id="statWrong">0</div><div class="l">错题库</div></div>
    </div>

    <button class="mode-btn practice" onclick="openSetup('practice')">
      <div class="ic">📘</div>
      <div><div class="t">练习模式</div><div class="d">自选题量与分类，智能优先复习错题</div></div>
      <div class="arrow">›</div>
    </button>
    <button class="mode-btn test" onclick="openSetup('test')">
      <div class="ic">📝</div>
      <div><div class="t">测试模式</div><div class="d">固定 20 题，模拟正式考试</div></div>
      <div class="arrow">›</div>
    </button>
    <button class="mode-btn wrongbank" onclick="openWrongBank()">
      <div class="ic">🔁</div>
      <div><div class="t">错题库复习</div><div class="d" id="wrongBankDesc">把做错的题再练一遍</div></div>
      <div class="arrow">›</div>
    </button>

    <div class="install-hint">💡 可以把本页面「添加到主屏幕/桌面」，之后无需联网也能离线练习</div>
  </div>

  <!-- SETUP (practice / test) -->
  <div class="screen" id="setup">
    <button class="back-link" onclick="show('home')">‹ 返回</button>
    <div class="card">
      <h2 id="setupTitle">练习模式</h2>
      <p class="desc" id="setupDesc">选择分类和题量，开始练习</p>

      <div class="section-title" style="margin-top:0;">分类</div>
      <div class="opt-row" id="catRow"></div>

      <div id="countSection">
        <div class="section-title">题量</div>
        <div class="opt-row" id="countRow"></div>
      </div>

      <div class="toggle-row" id="smartRow">
        <div>
          <div class="t">智能优先模式</div>
          <div class="d">错题、生疏的题会更常出现，掌握好的题会减少出现</div>
        </div>
        <div class="tog on" id="smartToggle" onclick="toggleSmart()"><div class="td"></div></div>
      </div>

      <button class="big-btn" id="startBtn" onclick="startSession()">开始</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="quiz">
    <div class="quiz-top">
      <span class="prog-txt" id="progTxt">1 / 20</span>
      <span class="cat-chip" id="quizCatChip">全部</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

    <div class="card">
      <div class="q-id" id="qId">Question ID - 00000</div>
      <div class="q-text" id="qText">…</div>
      <div id="ansList"></div>
      <div class="ref-box" id="refBox"></div>
      <button class="big-btn" id="nextBtn" style="display:none;" onclick="nextQuestion()">下一题</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="results">
    <div class="card">
      <div class="score-ring" id="scoreRing" style="--pct:0;">
        <div class="inner">
          <div class="pctnum" id="scorePct">0%</div>
          <div class="pctlbl">正确率</div>
        </div>
      </div>
      <div class="result-summary" id="resultSummary">共 0 题，答对 0 题</div>
      <button class="big-btn" id="reviewWrongBtn" onclick="reviewWrongFromResults()">复习本次错题</button>
      <button class="big-btn secondary" onclick="show('home');renderHome();">返回首页</button>
    </div>
    <div id="wrongList"></div>
  </div>

  <!-- WRONG BANK -->
  <div class="screen" id="wrongbank">
    <button class="back-link" onclick="show('home')">‹ 返回</button>
    <div class="card">
      <h2>错题库</h2>
      <p class="desc" id="wrongBankTop">还没有错题记录</p>
      <button class="big-btn" id="practiceWrongBtn" onclick="practiceAllWrong()">开始复习</button>
    </div>
    <div id="wrongBankList"></div>
  </div>

</div>

<script src="questions.js"></script>
<script>
// ═══ 常量 ═══
var CATS = {
  all:{label:'全部', match:function(q){return true;}},
  tech:{label:'技术类', match:function(q){return q.category==='tech'||q.category==='both';}},
  interview:{label:'面试类', match:function(q){return q.category==='interview'||q.category==='both';}}
};
var STATS_KEY = 'b777_stats_v1';
var STATS = {};
try{ STATS = JSON.parse(localStorage.getItem(STATS_KEY)||'{}'); }catch(e){ STATS = {}; }
function saveStats(){ try{ localStorage.setItem(STATS_KEY, JSON.stringify(STATS)); }catch(e){} }
function getStat(id){
  if(!STATS[id]) STATS[id] = { seen:0, wrong:0, weight:1 };
  return STATS[id];
}

// ═══ 屏幕切换 ═══
function show(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  var el = document.getElementById(id);
  if(el) el.classList.add('active');
  window.scrollTo(0,0);
}

// ═══ 首页统计 ═══
function renderHome(){
  document.getElementById('homeSub').textContent = '共 ' + QUESTIONS.length + ' 道题';
  var seen=0, wrongTotal=0, correctTotal=0, wrongBankCount=0;
  Object.keys(STATS).forEach(function(id){
    var s = STATS[id];
    if(s.seen>0){
      seen++;
      correctTotal += (s.seen - s.wrong);
      wrongTotal += s.wrong;
    }
    if(s.wrong>0 && s.wrong >= (s.seen - s.wrong)) wrongBankCount++;
  });
  document.getElementById('statSeen').textContent = seen;
  var totalAnswered = correctTotal + wrongTotal;
  document.getElementById('statAcc').textContent = totalAnswered>0 ? Math.round(correctTotal/totalAnswered*100)+'%' : '–';
  document.getElementById('statWrong').textContent = wrongBankCount;
  document.getElementById('wrongBankDesc').textContent = wrongBankCount>0 ? ('把做错的 ' + wrongBankCount + ' 道题再练一遍') : '把做错的题再练一遍';
}

// ═══ 会话状态 ═══
var SESSION = null; // {mode, catKey, list, idx, results:[{q,chosen,correct}]}
var SETUP_MODE = 'practice';
var SETUP_CAT = 'all';
var SETUP_COUNT = 30;
var SMART_ON = true;

function openSetup(mode){
  SETUP_MODE = mode;
  document.getElementById('setupTitle').textContent = mode==='practice' ? '练习模式' : '测试模式';
  document.getElementById('setupDesc').textContent = mode==='practice'
    ? '选择分类和题量，开始练习'
    : '选择分类，固定 20 题，模拟正式考试';
  document.getElementById('countSection').style.display = mode==='practice' ? 'block' : 'none';
  document.getElementById('smartRow').style.display = mode==='practice' ? 'flex' : 'none';

  var catRow = document.getElementById('catRow');
  catRow.innerHTML = '';
  Object.keys(CATS).forEach(function(k){
    var n = QUESTIONS.filter(CATS[k].match).length;
    var pill = document.createElement('div');
    pill.className = 'opt-pill' + (k===SETUP_CAT?' sel':'');
    pill.textContent = CATS[k].label + ' (' + n + ')';
    pill.onclick = function(){ SETUP_CAT = k; openSetup(mode); };
    catRow.appendChild(pill);
  });

  var countRow = document.getElementById('countRow');
  countRow.innerHTML = '';
  [20,30,50,100,'all'].forEach(function(c){
    var pill = document.createElement('div');
    pill.className = 'opt-pill' + (c===SETUP_COUNT?' sel':'');
    pill.textContent = c==='all' ? '全部' : c;
    pill.onclick = function(){ SETUP_COUNT = c; openSetup(mode); };
    countRow.appendChild(pill);
  });

  document.getElementById('smartToggle').className = 'tog' + (SMART_ON?' on':'');
  show('setup');
}
function toggleSmart(){
  SMART_ON = !SMART_ON;
  document.getElementById('smartToggle').className = 'tog' + (SMART_ON?' on':'');
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function pickRandom(pool, n){
  return shuffle(pool).slice(0, Math.min(n, pool.length));
}
function pickWeighted(pool, n){
  n = Math.min(n, pool.length);
  var candidates = pool.map(function(q){
    var w = (STATS[q.id] && STATS[q.id].weight) || 1;
    return { q:q, w: Math.max(0.15, w) };
  });
  var picked = [];
  for(var k=0;k<n;k++){
    var totalW = candidates.reduce(function(sum,c){return sum+c.w;},0);
    var r = Math.random()*totalW;
    var acc = 0, idx = -1;
    for(var i=0;i<candidates.length;i++){
      acc += candidates[i].w;
      if(r<=acc){ idx=i; break; }
    }
    if(idx===-1) idx = candidates.length-1;
    picked.push(candidates[idx].q);
    candidates.splice(idx,1);
  }
  return picked;
}

function startSession(){
  var pool = QUESTIONS.filter(CATS[SETUP_CAT].match);
  var count = SETUP_MODE==='test' ? 20 : (SETUP_COUNT==='all' ? pool.length : SETUP_COUNT);
  var list = (SETUP_MODE==='practice' && SMART_ON) ? pickWeighted(pool, count) : pickRandom(pool, count);
  if(list.length===0){ alert('该分类下没有题目'); return; }
  SESSION = { mode:SETUP_MODE, catKey:SETUP_CAT, list:list, idx:0, results:[] };
  document.getElementById('quizCatChip').textContent = CATS[SETUP_CAT].label + (SETUP_MODE==='test'?' · 测试':' · 练习');
  renderQuestion();
  show('quiz');
}

function practiceAllWrong(){
  var ids = Object.keys(STATS).filter(function(id){
    var s = STATS[id];
    return s.wrong>0 && s.wrong >= (s.seen - s.wrong);
  });
  var pool = QUESTIONS.filter(function(q){ return ids.indexOf(q.id)>=0; });
  if(pool.length===0){ alert('暂时没有错题'); return; }
  SESSION = { mode:'wrongbank', catKey:'all', list: shuffle(pool), idx:0, results:[] };
  document.getElementById('quizCatChip').textContent = '错题复习';
  renderQuestion();
  show('quiz');
}
function reviewWrongFromResults(){
  var wrongQs = SESSION.results.filter(function(r){return !r.correct;}).map(function(r){return r.q;});
  if(wrongQs.length===0){ show('home'); renderHome(); return; }
  SESSION = { mode:'wrongbank', catKey:'all', list: shuffle(wrongQs), idx:0, results:[] };
  document.getElementById('quizCatChip').textContent = '本次错题复习';
  renderQuestion();
  show('quiz');
}

function renderQuestion(){
  var q = SESSION.list[SESSION.idx];
  document.getElementById('progTxt').textContent = (SESSION.idx+1) + ' / ' + SESSION.list.length;
  document.getElementById('progFill').style.width = Math.round((SESSION.idx)/SESSION.list.length*100) + '%';
  document.getElementById('qId').textContent = 'Question ID - ' + q.id + (q.lastEdit ? (' · 更新于 ' + q.lastEdit) : '');
  document.getElementById('qText').textContent = q.question;
  var refBox = document.getElementById('refBox');
  refBox.className = 'ref-box';
  refBox.innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';

  var list = document.getElementById('ansList');
  list.innerHTML = '';
  ['A','B','C','D'].forEach(function(letter){
    if(!q.options[letter]) return;
    var btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = '<span class="lt">'+letter+'</span><span>'+escapeHtml(q.options[letter])+'</span>';
    btn.onclick = function(){ answerQuestion(letter); };
    list.appendChild(btn);
  });
}
function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
  });
}

function answerQuestion(letter){
  var q = SESSION.list[SESSION.idx];
  var correct = letter === q.answer;
  var buttons = document.querySelectorAll('#ansList .ans-btn');
  buttons.forEach(function(btn){
    btn.disabled = true;
    var lt = btn.querySelector('.lt').textContent;
    if(lt === q.answer) btn.classList.add('correct');
    else if(lt === letter) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  if(q.reference){
    var refBox = document.getElementById('refBox');
    refBox.className = 'ref-box show';
    refBox.innerHTML = '<b>参考：</b>' + escapeHtml(q.reference);
  }

  // 更新统计 + 权重
  var s = getStat(q.id);
  s.seen++;
  if(!correct){
    s.wrong++;
    s.weight = Math.min(6, s.weight + 2);
  } else {
    s.weight = Math.max(0.15, s.weight - 0.5);
  }
  saveStats();

  SESSION.results.push({ q:q, chosen:letter, correct:correct });
  document.getElementById('nextBtn').textContent = (SESSION.idx+1 < SESSION.list.length) ? '下一题' : '查看结果';
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion(){
  SESSION.idx++;
  if(SESSION.idx >= SESSION.list.length){
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults(){
  var total = SESSION.results.length;
  var correct = SESSION.results.filter(function(r){return r.correct;}).length;
  var pct = total>0 ? Math.round(correct/total*100) : 0;
  document.getElementById('scoreRing').style.setProperty('--pct', pct);
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('resultSummary').textContent = '共 ' + total + ' 题，答对 ' + correct + ' 题，答错 ' + (total-correct) + ' 题';

  var wrongOnes = SESSION.results.filter(function(r){return !r.correct;});
  document.getElementById('reviewWrongBtn').style.display = wrongOnes.length>0 ? 'block' : 'none';

  var listEl = document.getElementById('wrongList');
  listEl.innerHTML = '';
  if(wrongOnes.length===0){
    listEl.innerHTML = '<div class="empty-state"><div class="em">🎉</div>全部答对，太棒了！</div>';
  } else {
    var title = document.createElement('div');
    title.className = 'section-title';
    title.style.marginTop = '4px';
    title.textContent = '本次错题 (' + wrongOnes.length + ')';
    listEl.appendChild(title);
    wrongOnes.forEach(function(r){
      var div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML =
        '<div class="qid">Question ID - '+r.q.id+'</div>' +
        '<div class="qtext">'+escapeHtml(r.q.question)+'</div>' +
        '<div class="line bad">你的答案：'+r.chosen+'. '+escapeHtml(r.q.options[r.chosen]||'')+'</div>' +
        '<div class="line good">正确答案：'+r.q.answer+'. '+escapeHtml(r.q.options[r.q.answer]||'')+'</div>' +
        (r.q.reference ? '<div class="ref">参考：'+escapeHtml(r.q.reference)+'</div>' : '');
      listEl.appendChild(div);
    });
  }
  show('results');
}

// ═══ 错题库页面 ═══
function openWrongBank(){
  var items = Object.keys(STATS).map(function(id){ return {id:id, s:STATS[id]}; })
    .filter(function(o){ return o.s.wrong>0 && o.s.wrong >= (o.s.seen - o.s.wrong); });
  var listEl = document.getElementById('wrongBankList');
  listEl.innerHTML = '';
  document.getElementById('practiceWrongBtn').style.display = items.length>0 ? 'block' : 'none';
  document.getElementById('wrongBankTop').textContent = items.length>0
    ? ('目前有 ' + items.length + ' 道题掌握得还不够牢，建议重点复习')
    : '还没有错题记录，去练习或测试几道题吧';
  items.forEach(function(o){
    var q = QUESTIONS.find(function(x){return x.id===o.id;});
    if(!q) return;
    var div = document.createElement('div');
    div.className = 'wrong-item';
    div.innerHTML =
      '<div class="qid">Question ID - '+q.id+' · 做错 '+o.s.wrong+'/'+o.s.seen+' 次</div>' +
      '<div class="qtext">'+escapeHtml(q.question)+'</div>' +
      '<div class="line good">正确答案：'+q.answer+'. '+escapeHtml(q.options[q.answer]||'')+'</div>' +
      (q.reference ? '<div class="ref">参考：'+escapeHtml(q.reference)+'</div>' : '');
    listEl.appendChild(div);
  });
  show('wrongbank');
}

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}

renderHome();
</script>
